<html lang="ko">
<head>
<meta charset="UTF-8" />

<title>아라쇼 하이라이트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="style.css">
<style>
    /* ✨ 전체 페이지 스크롤 금지 (뷰포트 고정) */
    html, body {
        overflow: hidden;
        height: 100%;
        margin: 0;
        padding: 0;
    }

    .page-wrapper {
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .hl-wrapper {
        flex: 1; 
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }

    /* 상단 타이틀 영역 */
    .hl-header-bar {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 15px;
        max-width: 960px; /* 영상+패널 너비만큼 중앙정렬 위함 */
        margin-left: auto;
        margin-right: auto;
        width: 100%;
    }

    .hl-profile {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid #e2e8f0;
        object-fit: contain;
        background: #fff;
    }

    .hl-title {
        font-size: 18px;
        font-weight: 800;
        color: #0f172a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
    }

    /* ✨ 메인 레이아웃: 중앙으로 예쁘게 모으기 */
    .hl-main-layout {
        display: flex;
        justify-content: center; /* 양끝 밀어내기 삭제, 가운데 정렬 */
        align-items: stretch;
        gap: 40px; /* 영상과 우측 패널 사이 간격 */
        flex: 1;
        min-height: 0; 
    }

    /* 좌측 쇼츠 플레이어 영역 (노란색 박스 영역) */
    .hl-video-area {
        width: 420px;
        flex-shrink: 0;
        background: #0f172a;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        position: relative;
    }

    .hl-video-area iframe {
        width: 100%;
        height: 100%;
        border: none;
        pointer-events: none; 
    }
    
    .video-scroll-layer {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 5;
    }

    /* 우측 사이드 패널 (빨간색+파란색 박스 영역) */
    .hl-side-panel {
        width: 500px; /* 캡처본처럼 넓고 시원하게 사이즈 고정 */
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* 우측 상단 - 관련 상품 목록 */
    .hl-product-box {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        height: 480px; /* 고정 높이 */
    }

    .hl-item-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
        padding-right: 5px;
        flex: 1;
    }

    .hl-item {
        display: flex;
        gap: 14px;
        align-items: center;
        padding: 6px;
    }

    .hl-item-thumb {
        width: 64px;
        height: 64px;
        border-radius: 10px;
        background: #f1f5f9;
        overflow: hidden;
        flex-shrink: 0;
        border: 1px solid #e2e8f0;
    }

    .hl-item-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .hl-item-title { font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 4px; }
    .hl-item-price { font-size: 15px; font-weight: 800; color: #0f172a; }

    /* ✨ 우측 하단 - 미니 플레이리스트 슬라이더 (파란색 박스 영역) */
    .mini-playlist-section {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        padding: 20px;
        position: relative;
        display: flex;
        flex-direction: column;
        flex: 1; /* 남은 세로 공간 꽉 채우기 */
        min-height: 0; /* 내부 스크롤 허용 */
    }

    .mini-playlist-title {
        font-size: 15px;
        font-weight: 800;
        margin-bottom: 15px;
        color: #64748b;
    }

    .slider-container {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
        flex: 1;
        overflow: hidden;
    }

    .hl-playlist {
        display: flex;
        gap: 14px; /* 간격 살짝 넓힘 */
        overflow-x: hidden;
        scroll-behavior: smooth;
        padding: 5px 0;
        width: 100%;
        height: 100%;
        align-items: center;
    }

    /* ✨ 썸네일 개수 축소 및 퀄리티 향상 */
    .hl-thumb-item {
        width: 90px; /* 크기를 적당히 키워서 보여지는 갯수 줄임 */
        flex-shrink: 0;
        cursor: pointer;
        display: flex;
        flex-direction: column;
    }

    .hl-thumb-img-wrap {
        width: 100%;
        aspect-ratio: 9 / 16;
        border-radius: 10px;
        overflow: hidden;
        background: #000;
        border: 3px solid transparent;
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .hl-thumb-item.active .hl-thumb-img-wrap { border-color: #2563eb; transform: translateY(-4px); }
    .hl-thumb-img-wrap img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.2s;}
    .hl-thumb-item:hover img { opacity: 0.8; }
    .hl-thumb-item.active img { opacity: 1; }
    
    /* 실제 유튜브 제목이 들어갈 텍스트 속성 */
    .hl-thumb-item p { 
        font-size: 11px; 
        color: #475569; 
        margin-top: 8px; 
        font-weight: 600; 
        text-align: center;
        /* 긴 제목 말줄임표 처리 */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* 화살표 버튼 스타일 */
    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        height: 32px;
        background: rgba(255,255,255,0.95);
        border: 1px solid #e2e8f0;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        color: #334155;
    }
    .nav-btn:hover { background: #fff; color: #2563eb; }
    .nav-btn.prev { left: -10px; }
    .nav-btn.next { right: -10px; }

</style>
</head>
<body onwheel="handleGlobalWheel(event)">

<div class="page-wrapper">

            <a href="index.html"><img class="logo-image" src="아라쇼로고.png" alt="아라쇼" /></a>

<ul class="nav-menu">
    <li><a href="index.html"><i class="fa-solid fa-circle" style="font-size: 10px; color: #ef4444; margin-right: 4px;"></i>LIVE</a></li>

</ul>
        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-regular fa-user"></i>
        </div>
    </header>

    <main class="hl-wrapper">
        <div class="hl-header-bar">
            <img src="아라쇼로고.png" alt="프로필" class="hl-profile">
            <div class="hl-title" id="mainTitle">영상 제목을 불러오는 중...</div>
        </div>

        <div class="hl-main-layout">
            <div class="hl-video-area">
                <div class="video-scroll-layer"></div>
                <iframe id="shortsPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="hl-side-panel">
                <div class="hl-product-box">
                    <div style="font-size: 16px; font-weight: 800; margin-bottom:20px; display:flex; justify-content: space-between;">
                        관련 상품 <span style="color:#ef4444; font-size: 13px;">LIVE 특가 진행 중</span>
                    </div>
                    <div class="hl-item-list">
                        <div class="hl-item">
                            <div class="hl-item-thumb"><img src="https://vitsonimg.co.kr/images/productsNew/569/569522.JPG"></div>
                            <div class="hl-item-info">
                                <div class="hl-item-title">실외기 받침대 세트</div>
                                <div class="hl-item-price">LIVE 특가</div>
                            </div>
                        </div>
                        <div class="hl-item">
                            <div class="hl-item-thumb"><img src="https://vitsonimg.co.kr/images/productsNew/562/562066%20%EB%B9%84%EC%B8%A0%EC%98%A8%20%EC%95%95%EC%B6%95%EB%B6%84%EB%AC%B4%EA%B8%B0%20%ED%95%B8%EB%94%94%ED%98%95_7-1.jpg"></div>
                            <div class="hl-item-info">
                                <div class="hl-item-title">압축분무기 핸디형</div>
                                <div class="hl-item-price">LIVE 특가</div>
                            </div>
                        </div>
                        <div class="hl-item">
                            <div class="hl-item-thumb"><img src="https://vitsonimg.co.kr/images/productsNew/382/382599.JPG"></div>
                            <div class="hl-item-info">
                                <div class="hl-item-title">태양 파티조명 10M</div>
                                <div class="hl-item-price">LIVE 특가</div>
                            </div>
                        </div>
                    </div>
                    <button style="width:100%; height:46px; border-radius:12px; border:1px solid #e2e8f0; background:#f8fafc; font-weight:800; color:#334155; margin-top:15px; cursor:pointer;">전체 상품 보기</button>
                </div>

                <div class="mini-playlist-section">
                    <div class="mini-playlist-title">다른 하이라이트 영상</div>
                    <div class="slider-container">
                        <div class="nav-btn prev" onclick="scrollPlaylist(-1)"><i class="fa-solid fa-chevron-left"></i></div>
                        <div class="hl-playlist" id="playlistContainer"></div>
                        <div class="nav-btn next" onclick="scrollPlaylist(1)"><i class="fa-solid fa-chevron-right"></i></div>
                    </div>
                </div>
            </div>
        </div>

</div>

<script>
    const videoIds = [
        "gdI_cnLg3CM", "IXiXrmSpofQ", "0rzrzM9x8g4", "5cwpA2BZfUQ", 
        "GTMnkslPrvw", "AB6rIIVUaRg", "jUhZYbRxWuc", "5HBZ6Ty23kI", 
        "LJd1vm4BXzw", "_BrrAaJRhf4", "8Rrqcz3o1F4", "Slnqcx_lHIA", 
        "D6GjltI9IvU", "EyTfKYU1Lq4", "3btGA4-OuAU"
    ];

    // 제목을 저장할 배열
    const videoTitles = new Array(videoIds.length).fill("하이라이트 영상 로딩중...");

    let currentIndex = 0;
    let isScrolling = false; 
    const player = document.getElementById('shortsPlayer');
    const title = document.getElementById('mainTitle');
    const playlistContainer = document.getElementById('playlistContainer');

    function loadVideo(index) {
        if (index < 0 || index >= videoIds.length) return;
        currentIndex = index;
        const videoId = videoIds[currentIndex];
        
        player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&controls=0&rel=0`;
        
        // 동적으로 가져온 실제 유튜브 제목 적용
        title.innerText = videoTitles[currentIndex];

        document.querySelectorAll('.hl-thumb-item').forEach((el, i) => {
            el.classList.toggle('active', i === currentIndex);
        });

        const activeThumb = document.querySelectorAll('.hl-thumb-item')[currentIndex];
        if (activeThumb) {
            playlistContainer.scrollTo({
                left: activeThumb.offsetLeft - (playlistContainer.offsetWidth / 2) + (activeThumb.offsetWidth / 2),
                behavior: 'smooth'
            });
        }
    }

    function handleGlobalWheel(e) {
        if (isScrolling) return;

        isScrolling = true;
        if (e.deltaY > 0) {
            if (currentIndex < videoIds.length - 1) loadVideo(currentIndex + 1);
        } else {
            if (currentIndex > 0) loadVideo(currentIndex - 1);
        }

        setTimeout(() => { isScrolling = false; }, 800);
    }

    function scrollPlaylist(direction) {
        const scrollAmount = 210; // 한번에 두개 정도 넘어가게 세팅
        playlistContainer.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
    }

    // ✨ 유튜브 실제 제목 가져오기 (oEmbed API 활용) ✨
    async function fetchYouTubeTitles() {
        for (let i = 0; i < videoIds.length; i++) {
            try {
                // 유튜브 공식 oEmbed API를 호출하여 제목 텍스트를 추출
                const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoIds[i]}&format=json`);
                const data = await res.json();
                
                if (data.title) {
                    videoTitles[i] = data.title;
                    // 하단 썸네일 제목 업데이트
                    const titleEl = document.getElementById(`thumb-title-${i}`);
                    if (titleEl) titleEl.innerText = data.title;
                    
                    // 현재 재생중인 영상이라면 상단 메인 타이틀도 업데이트
                    if (currentIndex === i) {
                        title.innerText = data.title;
                    }
                }
            } catch(e) {
                videoTitles[i] = "아라쇼 숏폼 하이라이트";
            }
        }
    }

    // 화면 초기화
    function init() {
        videoIds.forEach((id, index) => {
            const div = document.createElement('div');
            div.className = 'hl-thumb-item';
            div.innerHTML = `
                <div class="hl-thumb-img-wrap"><img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg"></div>
                <p id="thumb-title-${index}">로딩중...</p>
            `;
            div.onclick = () => loadVideo(index);
            playlistContainer.appendChild(div);
        });

        loadVideo(0);
        fetchYouTubeTitles(); // 백그라운드에서 제목 가져오기 시작
    }

    init();
</script>

</body>
